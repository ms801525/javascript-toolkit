<!DOCTYPE html>

<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title></title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles.css">
        <script src="script.js" async defer></script>
    </head>
    <body>
    <!-- This is code for the Calculator -->
        <div class="div">
            <h1>Calculator</h1>
            <input class="calculate-input" type="number" placeholder="Enter expression to be calculated" id="input1">
            <select name="operations" id="operations" class="calculate-select">
                <option value="add">+</option>
                <option value="subtract">-</option>
                <option value="multiply">X</option>
                <option value="divide">/</option>
            </select>
            <input class="calculate-input" type="number" placeholder="Enter expression to be calculated" id="input2">

            <button class="calculate-button" id="calculate-button">Calculate</button>
            <div class="calculate-output">
                <p id="output" class="output"></p>
            </div>
        </div>


    <!-- This is code for the Unit Converter -->
        <div class="div">
            <h1>Unit Converter</h1>
            <input class="unit-converter-input" type="text" placeholder="Enter value to be converted">
            <button class="unit-converter-button">Convert</button>

        </div>


    <!-- This is code for the Text Analyzer -->
        <div class="div">
            <h1>Text Analyzer</h1>
            <input class="text-input" type="text" placeholder="Enter text to be analyzed">
            <button class="text-analyzer-button">Analyze</button>

        </div>


    <!-- This is code for the JSON Formatter -->
        <div class="div">
            <h1>JSON Formatter</h1>
            <input class="json-formatter-input" type="text" placeholder="Enter JSON to be formatted">
            <button class="json-formatter-button">Format</button>

        </div>
        
    </body>
</html>
